<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat App</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #app { background: white; width: 400px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    #header { background: #075e54; color: white; padding: 16px; font-size: 18px; font-weight: bold; }
    #messages { height: 400px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .message { background: #dcf8c6; padding: 8px 12px; border-radius: 8px; max-width: 80%; align-self: flex-end; }
    .message.other { background: #fff; border: 1px solid #eee; align-self: flex-start; }
    .message .sender { font-size: 11px; color: #888; margin-bottom: 4px; }
    #footer { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #eee; }
    #input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
    #send { background: #075e54; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; }
    #login { padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    #login input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
    #login button { background: #075e54; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 16px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">💬 Chat App</div>

    <!-- Login Screen -->
    <div id="login">
      <h3>Enter your name to join</h3>
      <input type="text" id="username" placeholder="Your name" />
      <button onclick="joinChat()">Join Chat</button>
    </div>

    <!-- Chat Screen (hidden initially) -->
    <div id="chat" style="display:none;">
      <div id="messages"></div>
      <div id="footer">
        <input type="text" id="input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" />
        <button id="send" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const socket = io('http://localhost:3000');
    let username = '';

    function joinChat() {
      const val = document.getElementById('username').value.trim();
      if (!val) return alert('Please enter a name');
      username = val;
      document.getElementById('login').style.display = 'none';
      document.getElementById('chat').style.display = 'block';
    }

    function sendMessage() {
      const input = document.getElementById('input');
      const message = input.value.trim();
      if (!message) return;
      socket.emit('sendMessage', { sender: username, message });
      input.value = '';
    }

    socket.on('receiveMessage', (data) => {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.classList.add('message');
      if (data.sender !== username) div.classList.add('other');
      div.innerHTML = `<div class="sender">${data.sender}</div>${data.message}`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    });
  </script>
</body>
</html>
